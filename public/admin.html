<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - ShopEasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    .navbar {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .navbar h2 { font-size: 24px; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
    }
    .container { max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .tabs { display: flex; gap: 12px; margin-bottom: 24px; }
    .tab {
      padding: 12px 24px;
      border-radius: 10px;
      border: none;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      background: white;
      color: #999;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .tab.active {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
    }
    .section { display: none; }
    .section.active { display: block; }

    /* Add Product Form */
    .form-card {
      background: white;
      border-radius: 16px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      margin-bottom: 30px;
    }
    .form-card h2 { font-size: 22px; color: #333; margin-bottom: 20px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-grid input, .form-grid select, .form-grid textarea {
      padding: 12px 16px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      width: 100%;
    }
    .form-grid input:focus, .form-grid select:focus { border-color: #f5576c; }
    .form-grid textarea { grid-column: 1/-1; height: 80px; resize: none; }
    .add-btn {
      margin-top: 16px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    /* Products Table */
    .table-card {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }
    .table-card h2 { font-size: 22px; color: #333; margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f5f5f5; padding: 12px 16px; text-align: left; font-size: 14px; color: #666; }
    td { padding: 14px 16px; border-bottom: 1px solid #f5f5f5; font-size: 14px; color: #333; }
    .delete-btn {
      padding: 6px 14px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .status-select {
      padding: 6px 12px;
      border: 2px solid #eee;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
    }
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
    }
    .status-pending { background: #fff3cd; color: #856404; }
    .status-processing { background: #cce5ff; color: #004085; }
    .status-shipped { background: #d4edda; color: #155724; }
    .status-delivered { background: #d4edda; color: #155724; }
    .status-cancelled { background: #f8d7da; color: #721c24; }
    .msg { color: green; margin-top: 10px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>🛍️ ShopEasy Admin</h2>
    <div class="nav-links">
      <a href="/products.html">🛒 Store</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="container">
    <div class="tabs">
      <button class="tab active" onclick="showTab('products')">📦 Products</button>
      <button class="tab" onclick="showTab('orders')">🧾 Orders</button>
    </div>

    <!-- Products Section -->
    <div class="section active" id="products">
      <div class="form-grid">
        <input type="text" id="pName" placeholder="Product name" />
        <input type="number" id="pPrice" placeholder="Price (₹)" />
        <select id="pCategory">
            <option value="">Category select karo</option>
            <option value="Electronics">Electronics</option>
            <option value="Clothing">Clothing</option>
            <option value="Books">Books</option>
            <option value="Food">Food</option>
            <option value="Sports">Sports</option>
        </select>
        <input type="number" id="pStock" placeholder="Stock quantity" />
        <textarea id="pDesc" placeholder="Product description"></textarea>
        <input type="file" id="pImage" accept="image/*" style="border: 2px dashed #f5576c; padding: 12px;" />
     </div>
        
        <button class="add-btn" onclick="addProduct()">➕ Product Add Karo</button>
        <p class="msg" id="addMsg"></p>
      </div>

      <div class="table-card">
        <h2>📦 Sare Products</h2>
        <table>
          <thead>
            <tr>
              <th>Product</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Rating</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </div>

    <!-- Orders Section -->
    <div class="section" id="orders">
      <div class="table-card">
        <h2>🧾 Sare Orders</h2>
        <table>
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Customer</th>
              <th>Items</th>
              <th>Total</th>
              <th>Status</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="ordersTable"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    const token = localStorage.getItem('token')
    const user = JSON.parse(localStorage.getItem('user') || '{}')
    if (!token || user.role !== 'admin') window.location.href = '/index.html'

    function showTab(tab) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'))
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
      document.getElementById(tab).classList.add('active')
      event.target.classList.add('active')
      if (tab === 'orders') loadOrders()
    }

    

    async function addProduct() {
        const name = document.getElementById('pName').value
        const price = document.getElementById('pPrice').value
        const category = document.getElementById('pCategory').value
        const stock = document.getElementById('pStock').value
        const description = document.getElementById('pDesc').value
        const image = document.getElementById('pImage').files[0]
        const msg = document.getElementById('addMsg')

        if (!name || !price || !category || !stock || !description) {
            msg.style.color = 'red'
            msg.textContent = 'Sab fields bharo!'
            return
        }

        const formData = new FormData()
        formData.append('name', name)
        formData.append('price', price)
        formData.append('category', category)
        formData.append('stock', stock)
        formData.append('description', description)
        if (image) formData.append('image', image)

        const res = await fetch('/products/add', {
            method: 'POST',
            headers: {
                'Authorization': 'Bearer ' + token
            },
             body: formData
            })

        const data = await res.json()
        if (res.ok) {
        msg.style.color = 'green'
        msg.textContent = '✅ Product add ho gaya!'
        document.getElementById('pName').value = ''
        document.getElementById('pPrice').value = ''
        document.getElementById('pCategory').value = ''
        document.getElementById('pStock').value = ''
        document.getElementById('pDesc').value = ''
        document.getElementById('pImage').value = ''
        loadProducts()
        } else {
            msg.style.color = 'red'
            msg.textContent = data.message
        }
    }

    async function loadProducts() {
      const res = await fetch('/products')
      const products = await res.json()
      const tbody = document.getElementById('productsTable')
      tbody.innerHTML = products.map(p => `
        <tr>
          <td><strong>${p.name}</strong></td>
          <td>${p.category}</td>
          <td>₹${p.price.toLocaleString()}</td>
          <td>${p.stock}</td>
          <td>⭐ ${p.avgRating.toFixed(1)}</td>
          <td>
            <button class="delete-btn" onclick="deleteProduct('${p._id}')">🗑️ Delete</button>
          </td>
        </tr>
      `).join('')
    }

    async function deleteProduct(id) {
      if (!confirm('Delete karna hai?')) return
      await fetch(`/products/delete/${id}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      loadProducts()
    }

    async function loadOrders() {
      const res = await fetch('/orders/all', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      const orders = await res.json()
      const tbody = document.getElementById('ordersTable')
      tbody.innerHTML = orders.map(o => `
        <tr>
          <td>#${o._id.slice(-8).toUpperCase()}</td>
          <td>${o.user?.name || 'User'}<br><small>${o.user?.email || ''}</small></td>
          <td>${o.items.length} items</td>
          <td>₹${o.totalAmount.toLocaleString()}</td>
          <td><span class="status-badge status-${o.status}">${o.status.toUpperCase()}</span></td>
          <td>
            <select class="status-select" onchange="updateStatus('${o._id}', this.value)">
              <option value="pending" ${o.status === 'pending' ? 'selected' : ''}>Pending</option>
              <option value="processing" ${o.status === 'processing' ? 'selected' : ''}>Processing</option>
              <option value="shipped" ${o.status === 'shipped' ? 'selected' : ''}>Shipped</option>
              <option value="delivered" ${o.status === 'delivered' ? 'selected' : ''}>Delivered</option>
              <option value="cancelled" ${o.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
            </select>
          </td>
        </tr>
      `).join('')
    }

    async function updateStatus(id, status) {
      await fetch(`/orders/status/${id}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ status })
      })
      alert('✅ Status update ho gaya!')
      loadOrders()
    }

    function logout() {
      localStorage.clear()
      window.location.href = '/index.html'
    }

    loadProducts()
  </script>
</body>
</html>
