<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart - ShopEasy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f5; }
    .navbar {
      background: linear-gradient(135deg, #f093fb, #f5576c);
      padding: 16px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
    }
    .navbar h2 { font-size: 24px; }
    .nav-links { display: flex; gap: 16px; }
    .nav-links a {
      color: white;
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.2);
    }
    .container { max-width: 900px; margin: 30px auto; padding: 0 20px; }
    h1 { font-size: 28px; color: #333; margin-bottom: 24px; }
    .cart-item {
      background: white;
      border-radius: 16px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    }
    .item-emoji { font-size: 48px; }
    .item-info { flex: 1; }
    .item-info h3 { font-size: 18px; color: #333; margin-bottom: 4px; }
    .item-info p { color: #999; font-size: 14px; }
    .item-price { font-size: 20px; font-weight: 800; color: #f5576c; }
    .remove-btn {
      padding: 8px 16px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }
    .cart-summary {
      background: white;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.06);
      margin-top: 24px;
    }
    .cart-summary h3 { font-size: 20px; color: #333; margin-bottom: 16px; }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .summary-row.total {
      font-weight: 800;
      font-size: 20px;
      color: #f5576c;
      border-top: 2px solid #eee;
      padding-top: 12px;
    }
    .address-input {
      width: 100%;
      padding: 14px;
      border: 2px solid #eee;
      border-radius: 10px;
      font-size: 15px;
      outline: none;
      margin-bottom: 16px;
      margin-top: 8px;
    }
    .address-input:focus { border-color: #f5576c; }
    .order-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f093fb, #f5576c);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
    }
    .empty-cart {
      text-align: center;
      padding: 60px;
      color: #999;
      font-size: 18px;
    }
    .empty-cart .icon { font-size: 60px; margin-bottom: 16px; }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>🛍️ ShopEasy</h2>
    <div class="nav-links">
      <a href="/products.html">🛒 Products</a>
      <a href="/orders.html">📦 Orders</a>
      <a href="#" onclick="logout()">Logout</a>
    </div>
  </div>

  <div class="container">
    <h1>🛒 Mera Cart</h1>
    <div id="cartItems"></div>
  </div>

  <script>
    const token = localStorage.getItem('token')
    if (!token) window.location.href = '/index.html'

    async function loadCart() {
      const res = await fetch('/cart', {
        headers: { 'Authorization': 'Bearer ' + token }
      })
      const cart = await res.json()
      const container = document.getElementById('cartItems')

      if (!cart.items || cart.items.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="icon">🛒</div>
            <p>Cart khali hai!</p>
            <br>
            <a href="/products.html" style="color:#f5576c;font-weight:700;">Shopping karo →</a>
          </div>`
        return
      }

      const total = cart.items.reduce((sum, i) => sum + (i.product?.price || 0) * i.quantity, 0)

      container.innerHTML = `
        ${cart.items.map(i => `
          <div class="cart-item">
            <div class="item-emoji">${getCategoryEmoji(i.product?.category)}</div>
            <div class="item-info">
              <h3>${i.product?.name || 'Product'}</h3>
              <p>Quantity: ${i.quantity}</p>
            </div>
            <div class="item-price">₹${((i.product?.price || 0) * i.quantity).toLocaleString()}</div>
            <button class="remove-btn" onclick="removeItem('${i.product?._id}')">🗑️ Remove</button>
          </div>
        `).join('')}
        <div class="cart-summary">
          <h3>Order Summary</h3>
          <div class="summary-row"><span>Items (${cart.items.length})</span><span>₹${total.toLocaleString()}</span></div>
          <div class="summary-row"><span>Delivery</span><span style="color:green">FREE</span></div>
          <div class="summary-row total"><span>Total</span><span>₹${total.toLocaleString()}</span></div>
          <label style="font-weight:600;color:#333;">Delivery Address:</label>
          <input type="text" class="address-input" id="address" placeholder="Apna address daalo..." />
          <button class="order-btn" onclick="placeOrder()">🚀 Order Place Karo</button>
        </div>
      `
    }

    function getCategoryEmoji(category) {
      const emojis = { 'Electronics': '📱', 'Clothing': '👕', 'Books': '📚', 'Food': '🍕', 'Sports': '⚽' }
      return emojis[category] || '📦'
    }

    async function removeItem(productId) {
      await fetch(`/cart/remove/${productId}`, {
        method: 'DELETE',
        headers: { 'Authorization': 'Bearer ' + token }
      })
      loadCart()
    }

    async function placeOrder() {
      const address = document.getElementById('address').value
      if (!address) return alert('Address daalo!')
      const res = await fetch('/orders/place', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token
        },
        body: JSON.stringify({ address })
      })
      const data = await res.json()
      if (res.ok) {
        alert('🎉 Order place ho gaya!')
        window.location.href = '/orders.html'
      } else {
        alert(data.message)
      }
    }

    function logout() {
      localStorage.clear()
      window.location.href = '/index.html'
    }

    loadCart()
  </script>
</body>
</html>
